<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星闪网关配置工具 - 登录</title>

    <!-- 登录页独立样式；不复用 dashboard 布局，避免全局变量冲突 -->
    <link rel="stylesheet" href="css/login.css" />
</head>
<body>
    <div class="main-wrapper">
        <!-- 左侧面板：放置动态背景与品牌槽位；不含交互控件 -->
        <section class="left-panel" aria-label="背景区域">
            <!-- 粒子动画所在的画布，particle-background.js 会挂载到此处 -->
            <canvas id="backgroundCanvas" aria-hidden="true"></canvas>

            <!-- Logo 区域-->
            <div class="logo-slot" id="appLogoSlot" aria-label="软件图标预留位" style="text-align: center; display: inline-block; background-color: transparent; width: auto; height: auto;">
                <img src="logo_big.png" alt="Logo" style="max-width: 100px; max-height: 30px; width: auto; height: auto; display: block;" />
            </div>
        </section>

        <!-- 右侧面板：主交互区域，承载登录表单与装饰背景 -->
        <section class="right-panel" aria-label="登录区域">
            <!-- 背景装饰光斑层，纯视觉元素 -->
            <div class="decorations" aria-hidden="true">
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
            </div>
            <!-- 同心圆环层，增加科技感背景纹理 -->
            <div class="decorations" aria-hidden="true">
                <div class="connection-rings">
                    <div class="ring ring-sm"></div>
                    <div class="ring ring-md"></div>
                    <div class="ring ring-lg"></div>
                    <div class="ring ring-orbit"></div>
                </div>
            </div>

            <!-- 登录卡片主体：标题、切换、表单与提交按钮 -->
            <div class="login-container">
                <div class="login-header">
                    <h2>星闪网关配置工具</h2>
                    <p id="authSubtitle">欢迎回来，请验证您的身份</p>
                </div>

                <div class="auth-panels">
                    <form class="login-form auth-panel is-active" id="loginForm" data-auth-panel="login">
                        <div class="input-group">
                            <label for="loginUsername">账号</label>
                            <input type="text" id="loginUsername" name="username" placeholder="请输入用户名" autocomplete="username" required />
                            <span class="focus-border" aria-hidden="true"></span>
                        </div>

                        <div class="input-group">
                            <label for="loginPassword">密码</label>
                            <input type="password" id="loginPassword" name="password" placeholder="请输入密码" autocomplete="current-password" required />
                            <span class="focus-border" aria-hidden="true"></span>
                        </div>

                        <button type="submit" class="login-btn">
                            <span>登 录</span>
                            <div class="btn-bg" aria-hidden="true"></div>
                        </button>

                        <div class="form-actions auth-switch" aria-label="注册与修改密码">
                            <button type="button" class="text-link" data-auth-tab="register">注册</button>
                            <button type="button" class="text-link" data-auth-tab="change">修改密码</button>
                        </div>
                    </form>

                    <form class="login-form auth-panel" id="registerForm" data-auth-panel="register">
                        <div class="input-group">
                            <label for="registerUsername">账号</label>
                            <input type="text" id="registerUsername" name="username" placeholder="请输入用户名" autocomplete="username" required />
                            <span class="focus-border" aria-hidden="true"></span>
                        </div>

                        <div class="input-group">
                            <label for="registerPassword">密码</label>
                            <input type="password" id="registerPassword" name="password" placeholder="请输入密码" autocomplete="new-password" required />
                            <span class="focus-border" aria-hidden="true"></span>
                        </div>

                        <div class="input-group">
                            <label for="registerPasswordConfirm">确认密码</label>
                            <input type="password" id="registerPasswordConfirm" name="passwordConfirm" placeholder="请再次输入密码" autocomplete="new-password" required />
                            <span class="focus-border" aria-hidden="true"></span>
                        </div>

                        <button type="submit" class="login-btn">
                            <span>注 册</span>
                            <div class="btn-bg" aria-hidden="true"></div>
                        </button>

                        <div class="form-actions auth-back" aria-label="返回登录">
                            <button type="button" class="text-link" data-auth-tab="login">返回登录</button>
                        </div>
                    </form>

                    <form class="login-form auth-panel" id="changePasswordForm" data-auth-panel="change">
                        <div class="input-group">
                            <label for="changeUsername">账号</label>
                            <input type="text" id="changeUsername" name="username" placeholder="请输入用户名" autocomplete="username" required />
                            <span class="focus-border" aria-hidden="true"></span>
                        </div>

                        <div class="input-group">
                            <label for="oldPassword">旧密码</label>
                            <input type="password" id="oldPassword" name="oldpassword" placeholder="请输入旧密码" autocomplete="current-password" required />
                            <span class="focus-border" aria-hidden="true"></span>
                        </div>

                        <div class="input-group">
                            <label for="newPassword">新密码</label>
                            <input type="password" id="newPassword" name="newpassword" placeholder="请输入新密码" autocomplete="new-password" required />
                            <span class="focus-border" aria-hidden="true"></span>
                        </div>

                        <button type="submit" class="login-btn">
                            <span>确 认 修 改</span>
                            <div class="btn-bg" aria-hidden="true"></div>
                        </button>

                        <div class="form-actions auth-back" aria-label="返回登录">
                            <button type="button" class="text-link" data-auth-tab="login">返回登录</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <!-- 引用正确的脚本文件 -->
    <script src="js/login.js" defer></script>
</body>
</html>
