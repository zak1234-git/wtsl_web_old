<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星闪动态子网管理系统 - 登录</title>

    <!-- 登录页独立样式；不复用 dashboard 布局，避免全局变量冲突 -->
    <link rel="stylesheet" href="css/login.css" />
</head>
<body>
    <div class="main-wrapper">
        <!-- 左侧面板：放置动态背景与品牌槽位；不含交互控件 -->
        <section class="left-panel" aria-label="背景区域">
            <!-- 粒子动画所在的画布，particle-background.js 会挂载到此处 -->
            <canvas id="backgroundCanvas" aria-hidden="true"></canvas>

            <!-- Logo 区域-->
            <div class="logo-slot" id="appLogoSlot" aria-label="软件图标预留位" style="text-align: center; display: inline-block; background-color: transparent; width: auto; height: auto;">
                <img src="logo_big.png" alt="Logo" style="max-width: 100px; max-height: 30px; width: auto; height: auto; display: block;" />
            </div>
        </section>

        <!-- 右侧面板：主交互区域，承载登录表单与装饰背景 -->
        <section class="right-panel" aria-label="登录区域">
            <!-- 背景装饰光斑层，纯视觉元素 -->
            <div class="decorations" aria-hidden="true">
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
            </div>
            <!-- 同心圆环层，增加科技感背景纹理 -->
            <div class="decorations" aria-hidden="true">
                <div class="connection-rings">
                    <div class="ring ring-sm"></div>
                    <div class="ring ring-md"></div>
                    <div class="ring ring-lg"></div>
                    <div class="ring ring-orbit"></div>
                </div>
            </div>

            <!-- 登录卡片主体：标题、输入框、辅助操作与提交按钮 -->
            <div class="login-container">
                <div class="login-header">
                    <h2>星闪动态子网管理系统</h2>
                    <p>欢迎回来，请验证您的身份</p>
                </div>

                <form class="login-form" id="loginForm">
                    <div class="input-group">
                        <label for="username">账号</label>
                        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required />
                        <span class="focus-border" aria-hidden="true"></span>
                    </div>

                    <div class="input-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required />
                        <span class="focus-border" aria-hidden="true"></span>
                    </div>

                    <div class="form-actions">
                        <label class="checkbox-container">
                            <input type="checkbox" />
                            <span class="checkmark" aria-hidden="true"></span>
                            记住我
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>

                    <button type="submit" class="login-btn">
                        <span>登 录</span>
                        <div class="btn-bg" aria-hidden="true"></div>
                    </button>
                </form>
            </div>
        </section>
    </div>

    <!-- 引用正确的脚本文件 -->
    <script src="js/login.js" defer></script>
</body>
</html>
